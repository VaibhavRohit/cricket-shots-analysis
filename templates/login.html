<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pro Cricket Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="logo">🏏 Pro<span>Analysis</span></a>
    </nav>

    <div class="container login-container">

        <div class="glass-card login-form">
            <h2 style="text-align: center; margin-bottom: 0;">Welcome Back</h2>
            <p style="text-align: center; color: var(--text-secondary); margin-top: 5px;">Login to access your dashboard
            </p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div
                style="color: #ff6b6b; background: rgba(255, 107, 107, 0.1); padding: 10px; border-radius: 6px; text-align: center;">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Username</label>
                    <input type="text" name="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <div style="text-align: center; font-size: 0.8rem; color: #666;">
                Demo Credentials: admin / password123
            </div>
        </div>
    </div>
</body>

</html>
